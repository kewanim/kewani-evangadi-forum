services:
  - type: web
    name: evangadi-forum-api
    env: node
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
